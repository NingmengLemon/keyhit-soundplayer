# KeyHit SoundPlayer 默认配置
# 运行: uv run keyhit-soundplayer -c config.toml

[audio]
# pygame mixer 预初始化参数；buffer 越小延迟越低，但太小可能爆音。
frequency = 44100
size = -16
channels = 2
buffer = 128
volume = 1.0

[playback]
# true: 后一个音效打断前一个未完成播放；false: 尽量叠放播放。
interrupt = true
channel_count = 8
# round_robin: 按顺序轮播；random: 每次随机挑选。
rotation = "round_robin"

[listener]
keyboard = true
mouse = false
gamepad = false
# 无手柄或手柄暂时断开时的后台重试间隔，单位秒。
gamepad_poll_interval = 1.0
# false: 按下时触发普通事件；true: 释放时触发普通事件。
trigger_on_release = false

[listener.long_press]
# 启用后，键盘按键/鼠标按钮按住超过 threshold 秒会触发 "按键名.long_press" 事件。
# 手柄和滚轮暂无释放事件，暂不参与长按判定。
enabled = false
# 长按判定阈值，单位秒。
threshold = 0.5
# 长按成立后重复触发间隔；0 表示只触发一次。
interval = 0.0
# true: 按下时仍触发普通按键事件；false: 只触发长按事件或释放事件。
emit_press = true
# 长按事件名后缀，例如 space.long_press、mouse.left.long_press。
event_suffix = ".long_press"

# 有序规则：解析时从上到下维护绑定状态。
# action = "set"    覆盖 selector 的绑定；selector = "all" 可作为默认绑定。
# action = "add"    追加音效到已有绑定，最终去重；没有已有绑定时等同 set。
# action = "clear"  删除 selector 的绑定。
# action = "remove" clear 的别名。

# 默认绑定：所有未单独配置的键都播放这些音效。
[[rules]]
action = "set"
selector = "all"
sounds = [{ directory = "resources", glob = "*.wav" }]
rotation = "random"

# 按键组映射：适合把某类键一键绑定到同一个音效。
# [[rules]]
